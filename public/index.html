<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- SIDEBAR (240px) -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="wordmark">
          <span class="wordmark-md">MD</span>
          <span class="wordmark-arrow">→</span>
          <span class="wordmark-doc">Doc</span>
        </div>
      </div>

      <!-- PRESETS LIST -->
      <section class="presets-section">
        <h3 class="section-label">Presets</h3>
        <div class="presets-list" id="presetsList">
          <!-- Populated by app.js -->
        </div>
      </section>

      <!-- CUSTOMIZE SECTION -->
      <section class="customize-section">
        <h3 class="section-label">Customize</h3>

        <div class="customize-group">
          <label class="customize-label">Color</label>
          <div class="palette-swatches" id="paletteSwatches">
            <!-- Populated by app.js -->
          </div>
        </div>

        <div class="customize-group">
          <label class="customize-label">Font</label>
          <div class="typography-pills" id="typographyPills">
            <!-- Populated by app.js -->
          </div>
        </div>

        <div class="customize-group">
          <label class="customize-label">Accent</label>
          <div class="accent-swatches" id="accentSwatches">
            <!-- Populated by app.js -->
          </div>
        </div>
      </section>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="main-content">
      <!-- EDITOR PANE -->
      <div class="editor-pane">
        <div class="pane-header">
          <span class="pane-label">Markdown</span>
          <label class="upload-btn" title="Upload .md file">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 15a.5.5 0 0 1-.5-.5V4.707L5.354 7.354a.5.5 0 0 1-.708-.708l3-3a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 4.707V14.5a.5.5 0 0 1-.5.5z"/>
              <path d="M14.5 6a.5.5 0 0 1 .5.5v2.5a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 1 0v2.5a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 .5-.5z"/>
            </svg>
            Upload
            <input type="file" accept=".md,.markdown,.txt" id="fileInput" hidden>
          </label>
        </div>
        <div class="drop-zone" id="dropZone">
          <textarea
            class="md-input"
            id="mdInput"
            placeholder="Paste your markdown here, or drop a .md file…"
            spellcheck="false"
          ></textarea>
          <div class="drop-overlay" id="dropOverlay">
            <div class="drop-icon">↓</div>
            <div class="drop-text">Drop .md file</div>
          </div>
        </div>
      </div>

      <!-- PREVIEW PANE -->
      <div class="preview-pane">
        <div class="pane-header">
          <span class="pane-label">Preview</span>
          <span class="preview-preset-name" id="previewPresetName"></span>
        </div>
        <iframe class="preview-frame" id="previewFrame" title="Document preview" sandbox="allow-same-origin"></iframe>
      </div>
    </div>

  </div>

  <!-- BOTTOM ACTION BAR (spans full width) -->
  <footer class="action-bar">
    <div class="format-toggle" role="group" aria-label="Output format">
      <button class="fmt-btn active" data-format="docx" id="btnDocx">DOCX</button>
      <button class="fmt-btn" data-format="pdf" id="btnPdf">PDF</button>
    </div>

    <p class="status-msg" id="statusMsg" aria-live="polite"></p>

    <button class="convert-btn" id="convertBtn" aria-label="Convert and download">
      <span id="convertLabel">Convert &amp; Download</span>
      <svg class="spinner" id="convertSpinner" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" hidden>
        <path d="M10 2a8 8 0 1 0 6 2.93" stroke-linecap="round"/>
      </svg>
    </button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
