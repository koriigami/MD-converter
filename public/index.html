<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="wordmark">
        <span class="wordmark-md">MD</span>
        <span class="wordmark-arrow">→</span>
        <span class="wordmark-doc" id="wordmarkDoc">Doc</span>
      </div>
      <span class="header-badge">20 styles</span>
    </header>

    <section class="strip-wrapper">
      <div class="strip-fade-left"></div>
      <div class="template-strip" id="templateStrip">
        <!-- Populated by app.js -->
      </div>
      <div class="strip-fade-right"></div>
    </section>

    <main class="editor-area">
      <div class="editor-pane">
        <div class="pane-header">
          <span class="pane-label">Markdown</span>
          <label class="upload-btn" title="Upload .md file">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 1a.5.5 0 0 1 .5.5v9.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 .708-.708L7.5 11.293V1.5A.5.5 0 0 1 8 1z"/>
              <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
            </svg>
            Upload file
            <input type="file" accept=".md,.markdown,.txt" id="fileInput" hidden>
          </label>
        </div>
        <div class="drop-zone" id="dropZone">
          <textarea
            class="md-input"
            id="mdInput"
            placeholder="Paste your markdown here, or drop a .md file…"
            spellcheck="false"
          ></textarea>
          <div class="drop-overlay" id="dropOverlay">
            <div class="drop-icon">↓</div>
            <div class="drop-text">Drop .md file</div>
          </div>
        </div>
      </div>

      <div class="pane-divider" id="paneDivider"></div>

      <div class="preview-pane">
        <div class="pane-header">
          <span class="pane-label">Preview</span>
          <span class="preview-template-name" id="previewTemplateName"></span>
        </div>
        <iframe class="preview-frame" id="previewFrame" title="Document preview" sandbox="allow-same-origin"></iframe>
      </div>
    </main>

    <footer class="bottom-bar">
      <div class="format-toggle" role="group" aria-label="Output format">
        <button class="fmt-btn active" data-format="docx" id="btnDocx">DOCX</button>
        <button class="fmt-btn" data-format="pdf" id="btnPdf">PDF</button>
      </div>

      <p class="status-msg" id="statusMsg" aria-live="polite"></p>

      <button class="convert-btn" id="convertBtn" aria-label="Convert and download">
        <span id="convertLabel">Convert &amp; Download</span>
        <svg class="spinner" id="convertSpinner" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" hidden>
          <path d="M10 2a8 8 0 1 0 6 2.93" stroke-linecap="round"/>
        </svg>
      </button>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
